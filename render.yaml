services:
  - type: web
    name: qr-backend-app
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qr-inventory-db
          property: connectionString
      - key: JWT_SECRET
        value: qr-inventory-secret-2026

databases:
  - name: qr-inventory-db
    databaseName: qr_inventory_db
    plan: free