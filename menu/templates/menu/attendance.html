{% extends 'menu/base.html' %}
{% block title %}Attendance — Saveur{% endblock %}
{% block content %}
<div class="page-wrap" style="max-width:700px">
  <h1 class="page-title">⏰ Attendance</h1>
  <p class="page-sub">Mark your attendance for today</p>
  <div id="att-status" style="margin-bottom:1.5rem"></div>
  <div class="card" style="margin-bottom:1.5rem">
    <div style="display:flex;gap:1rem;flex-wrap:wrap">
      <button class="btn btn-primary btn-lg" style="flex:1" onclick="checkIn()">✅ Check In</button>
      <button class="btn btn-outline btn-lg" style="flex:1" onclick="checkOut()">⏏ Check Out</button>
    </div>
    <div style="font-size:0.75rem;color:var(--text-dim);margin-top:0.75rem;text-align:center" id="att-time"></div>
  </div>
  <div class="card">
    <h3 style="font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1rem">My Attendance Record</h3>
    <div id="att-list"><div class="spinner"></div></div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const token=localStorage.getItem('token');
if(!token){window.location.href='/login/';}
setInterval(()=>{document.getElementById('att-time').textContent=new Date().toLocaleString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
async function checkIn(){
  try{const r=await fetch(`${API}/attendance/checkin`,{method:'POST',headers:authHeader()});const d=await r.json();showToast(d.message,'gold');loadAtt();}
  catch(e){showToast('Check-in failed','error');}
}
async function checkOut(){
  try{const r=await fetch(`${API}/attendance/checkout`,{method:'POST',headers:authHeader()});const d=await r.json();showToast(d.message,'gold');loadAtt();}
  catch(e){showToast('Check-out failed','error');}
}
async function loadAtt(){
  try{
    const r=await fetch(`${API}/attendance/my`,{headers:authHeader()});
    const rows=await r.json();
    if(!rows.length){document.getElementById('att-list').innerHTML='<div style="color:var(--text-muted);font-size:0.85rem">No records yet</div>';return;}
    const today=rows[0];
    const cin=today.check_in?new Date(today.check_in).toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}):'—';
    const cout=today.check_out?new Date(today.check_out).toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}):'—';
    document.getElementById('att-status').innerHTML=`<div class="alert alert-success">Today: Checked in ${cin}${today.check_out?' · Checked out '+cout:' · Still on shift'}</div>`;
    document.getElementById('att-list').innerHTML=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.85rem"><thead><tr>${['Date','In','Out','Hours','Status'].map(h=>`<th style="padding:0.5rem;text-align:left;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);border-bottom:1px solid var(--border)">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(a=>{const hrs=a.check_in&&a.check_out?((new Date(a.check_out)-new Date(a.check_in))/3600000).toFixed(1)+'h':'—';return`<tr><td style="padding:0.5rem;border-bottom:1px solid var(--border)">${a.date}</td><td style="padding:0.5rem;border-bottom:1px solid var(--border)">${a.check_in?new Date(a.check_in).toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}):'—'}</td><td style="padding:0.5rem;border-bottom:1px solid var(--border)">${a.check_out?new Date(a.check_out).toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}):'—'}</td><td style="padding:0.5rem;border-bottom:1px solid var(--border)">${hrs}</td><td style="padding:0.5rem;border-bottom:1px solid var(--border)"><span class="badge badge-green">${a.status}</span></td></tr>`;}).join('')}</tbody></table></div>`;
  }catch(e){}
}
loadAtt();
</script>
{% endblock %}
