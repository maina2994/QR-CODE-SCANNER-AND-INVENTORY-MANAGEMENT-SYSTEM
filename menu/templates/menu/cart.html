{% extends 'menu/base.html' %}
{% load static %}

{% block title %}Shopping Cart{% endblock %}
{% block header %}Shopping Cart{% endblock %}

{% block content %}
<div id="cart-container">
    <p>Loading cart...</p>
</div>

<script>
    function displayCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-container');
        
        if (cart.length === 0) {
            container.innerHTML = '<p>Your cart is empty.</p>';
            return;
        }

        let html = '<table style="width:100%; border-collapse:collapse;"><tr style="background-color:#f0f0f0;"><th>Item</th><th>Price</th><th>Qty</th><th>Subtotal</th><th>Action</th></tr>';
        let total = 0;

        cart.forEach((item, index) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;
            html += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:0.5rem;">${item.name}</td>
                <td style="padding:0.5rem;">$${parseFloat(item.price).toFixed(2)}</td>
                <td style="padding:0.5rem;">${item.quantity}</td>
                <td style="padding:0.5rem;">$${subtotal.toFixed(2)}</td>
                <td style="padding:0.5rem;"><button onclick="removeItem(${index})">Remove</button></td>
            </tr>`;
        });

        html += `</table><hr/><h3>Total: $${total.toFixed(2)}</h3><div style="margin-top:1rem;">
            <button onclick="checkout()" style="background-color:#1f8a70; color:white; padding:0.8rem 1.5rem; border:none; border-radius:8px; cursor:pointer; font-size:1rem;">Checkout</button>
        </div>`;
        container.innerHTML = html;
    }

    function removeItem(index) {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        displayCart();
    }

    function checkout() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        if (cart.length === 0) {
            alert('Cart is empty!');
            return;
        }
        window.location.href = '/confirmation/';
    }

    displayCart();
</script>
{% endblock %}
