{% extends 'menu/base.html' %}
{% block title %}Track Order — Saveur{% endblock %}
{% block extra_css %}
<style>
.track-wrap{max-width:600px;margin:0 auto;padding:2rem 1.25rem}
/* SEARCH */
.track-search{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.track-search-row{display:flex;gap:0.6rem}
/* STATUS TRACK */
.status-steps{display:flex;align-items:flex-start;gap:0;margin:1.5rem 0;position:relative}
.status-steps::before{content:'';position:absolute;top:20px;left:20px;right:20px;height:2px;background:var(--border);z-index:0}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.5rem;position:relative;z-index:1}
.step-circle{width:40px;height:40px;border-radius:50%;background:#fff;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.3s}
.step.done .step-circle{background:var(--success);border-color:var(--success);color:#fff}
.step.active .step-circle{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 0 4px rgba(139,69,19,0.15);animation:stepPulse 1.5s ease-in-out infinite}
@keyframes stepPulse{0%,100%{box-shadow:0 0 0 4px rgba(139,69,19,0.15)}50%{box-shadow:0 0 0 8px rgba(139,69,19,0.08)}}
.step-line{flex:1;height:2px;background:var(--border);margin-top:20px;transition:background 0.3s}
.step-line.done{background:var(--success)}
.step-label{font-size:0.68rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);text-align:center;max-width:70px}
.step.active .step-label,.step.done .step-label{color:var(--text)}
/* ORDER CARD */
.order-detail-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem;box-shadow:var(--shadow)}
.odc-header{padding:1rem 1.25rem;background:var(--sand-light);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.odc-body{padding:1.25rem}
.item-row{display:flex;justify-content:space-between;padding:0.45rem 0;font-size:0.88rem;border-bottom:1px solid var(--border)}
.item-row:last-child{border:none}
/* WAITER CARD */
.waiter-card{background:#fff;border:1px solid var(--border-hover);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:1rem}
.waiter-big-avatar{width:52px;height:52px;border-radius:50%;background:var(--gold-pale);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--gold-dark);flex-shrink:0}
/* REVIEW */
.review-card{background:var(--sand-light);border:1px solid var(--sand-dark);border-radius:var(--radius-lg);padding:1.25rem;margin-top:1rem}
.review-card h4{font-size:0.82rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--primary);margin-bottom:0.85rem}
.star-row{display:flex;gap:6px;margin-bottom:0.75rem}
.star{font-size:1.6rem;cursor:pointer;color:#ddd;transition:color 0.15s;-webkit-tap-highlight-color:transparent}
.star.filled{color:var(--gold)}
@media(max-width:500px){
  .track-search-row{flex-direction:column}
  .step-label{font-size:0.62rem;max-width:55px}
  .step-circle{width:34px;height:34px;font-size:0.85rem}
}
</style>
{% endblock %}

{% block content %}
<div class="track-wrap">
  <h1 class="page-title">Track Order</h1>
  <p class="page-sub">Live status updates</p>

  <!-- Search -->
  <div class="track-search">
    <div class="track-search-row">
      <input type="number" id="order-id-input" placeholder="Enter Order ID" min="1" style="flex:1">
      <button class="btn btn-primary" onclick="loadOrder()">Track</button>
    </div>
  </div>

  <div id="track-content"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const params=new URLSearchParams(location.search);
const preId=params.get('order_id')||localStorage.getItem('lastOrderId');
if(preId){ document.getElementById('order-id-input').value=preId; loadOrder(); }

const STATUS_STEPS=['pending','preparing','ready','served'];
const STATUS_LABELS=['Order Placed','Preparing','Ready','Served'];
const STATUS_ICONS=['📋','👨‍🍳','✅','🤵'];

let currentOrderId=null, currentWaiterId=null, reviewSubmitted=false;

async function loadOrder(){
  const id=document.getElementById('order-id-input').value.trim();
  if(!id){showToast('Please enter an order ID','error');return;}
  currentOrderId=id;
  document.getElementById('track-content').innerHTML='<div style="text-align:center;padding:2rem"><div class="spinner"></div></div>';
  try{
    const r=await fetch(`${API}/order/${id}`);
    if(!r.ok) throw new Error('Order not found');
    const d=await r.json();
    renderOrder(d);
  }catch(e){
    document.getElementById('track-content').innerHTML=`<div class="alert alert-error">Order #${id} not found. Please check your order ID.</div>`;
  }
}

function renderOrder({order, items}){
  if(!order){document.getElementById('track-content').innerHTML='<div class="alert alert-error">Order not found</div>';return;}
  currentWaiterId=order.waiter_id;
  const stepIdx=STATUS_STEPS.indexOf(order.status);

  let stepsHtml=STATUS_STEPS.map((s,i)=>{
    const state=i<stepIdx?'done':i===stepIdx?'active':'';
    return `
      <div class="step ${state}">
        ${i>0?`<div class="step-line ${i<=stepIdx?'done':''}"></div>`:''}
        <div class="step-circle">${STATUS_ICONS[i]}</div>
        <div class="step-label">${STATUS_LABELS[i]}</div>
      </div>
    `;
  }).join('');

  // Waiter card
  const waiterHtml=order.waiter_name?`
    <div class="waiter-card">
      <div class="waiter-big-avatar">${order.waiter_name.substring(0,2).toUpperCase()}</div>
      <div>
        <div style="font-weight:600;font-size:0.95rem;color:var(--text)">${order.waiter_name}</div>
        <div style="font-size:0.78rem;color:var(--text-muted)">Your waiter · Table ${order.table_number||'—'}</div>
      </div>
    </div>
  `:'';

  // Review (only if served/completed)
  const canReview=['served','completed'].includes(order.status)&&order.waiter_id&&!reviewSubmitted;
  const reviewHtml=canReview?`
    <div class="review-card">
      <h4>⭐ Rate Your Waiter</h4>
      <div class="star-row" id="stars">
        ${[1,2,3,4,5].map(n=>`<span class="star" onclick="setRating(${n})" data-val="${n}">★</span>`).join('')}
      </div>
      <textarea id="review-comment" rows="2" placeholder="Leave a comment (optional)" style="margin-bottom:0.75rem;resize:none"></textarea>
      <button class="btn btn-primary btn-sm" onclick="submitReview()">Submit Review</button>
    </div>
  `:'';

  document.getElementById('track-content').innerHTML=`
    ${waiterHtml}
    <div class="order-detail-card">
      <div class="odc-header">
        <div>
          <div style="font-weight:600;font-size:0.9rem">Order #${order.id}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">${new Date(order.created_at).toLocaleString('en-KE')}</div>
        </div>
        <span class="badge ${getStatusBadge(order.status)}">${order.status}</span>
      </div>
      <div class="odc-body">
        <div class="status-steps">${stepsHtml}</div>
        <div style="margin:1rem 0">
          ${items.map(i=>`
            <div class="item-row">
              <span>${i.name} × ${i.quantity}</span>
              <span style="color:var(--text-muted)">KES ${(i.price_kes*i.quantity).toLocaleString()}</span>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;padding-top:0.75rem;border-top:1px solid var(--border);font-weight:700;color:var(--primary)">
          <span>Total</span><span>KES ${parseFloat(order.total_kes).toLocaleString()}</span>
        </div>
        ${order.tip_kes>0?`<div style="font-size:0.78rem;color:var(--success);margin-top:0.3rem">+ KES ${parseFloat(order.tip_kes).toLocaleString()} tip</div>`:''}
        <div style="display:flex;gap:0.6rem;margin-top:1.1rem;flex-wrap:wrap">
          <a href="/payment/?order_id=${order.id}" class="btn btn-primary btn-sm" ${order.payment_status==='paid'?'style="display:none"':''}>Pay Now</a>
          <button class="btn btn-ghost btn-sm" onclick="loadOrder()">🔄 Refresh</button>
        </div>
      </div>
    </div>
    ${reviewHtml}
  `;

  // Auto-refresh every 12s if active
  if(!['served','completed'].includes(order.status)){
    setTimeout(loadOrder, 12000);
  }
}

function getStatusBadge(s){
  return{pending:'badge-yellow',preparing:'badge-blue',ready:'badge-green',served:'badge-gold',completed:'badge-earth'}[s]||'badge-gray';
}

let selectedRating=0;
function setRating(n){
  selectedRating=n;
  document.querySelectorAll('.star').forEach((s,i)=>{
    s.classList.toggle('filled',i<n);
  });
}

async function submitReview(){
  if(!selectedRating){showToast('Please select a star rating','error');return;}
  try{
    await fetch(`${API}/reviews`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({orderId:currentOrderId,waiterId:currentWaiterId,rating:selectedRating,comment:document.getElementById('review-comment').value.trim()})
    });
    reviewSubmitted=true;
    document.querySelector('.review-card').innerHTML='<div class="alert alert-success">✓ Thank you for your review!</div>';
    showToast('Review submitted!','gold');
  }catch(e){showToast('Could not submit review','error');}
}

// Live socket updates
window.addEventListener('orderStatusUpdate',e=>{
  if(String(e.detail.orderId)===String(currentOrderId)) loadOrder();
});
</script>
{% endblock %}
