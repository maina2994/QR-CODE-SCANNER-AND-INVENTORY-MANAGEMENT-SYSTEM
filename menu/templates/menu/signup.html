{% extends 'menu/base.html' %}
{% block title %}Staff Registration — Saveur{% endblock %}
{% block extra_css %}
<style>
.auth-page{min-height:85vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem;background:linear-gradient(135deg,var(--sand-light) 0%,var(--cream) 100%)}
.auth-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-xl);padding:2.5rem 2rem;width:100%;max-width:460px;box-shadow:var(--shadow-lg)}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--primary);letter-spacing:0.1em;text-align:center;margin-bottom:0.25rem}
.auth-sub{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);text-align:center;margin-bottom:2rem}
@media(max-width:480px){.auth-card{padding:2rem 1.25rem;border-radius:var(--radius-lg)}}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">SAVEUR</div>
    <div class="auth-sub">Create Staff Account</div>
    <div class="ornament" style="margin-bottom:1.75rem"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line r"></div></div>
    <div id="err-msg"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@restaurant.com" autocomplete="email">
      <div style="font-size:0.72rem;color:var(--text-dim);margin-top:0.3rem">Must be a @restaurant.com address</div>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="">Select your role</option>
        <option value="waiter">Waiter</option>
        <option value="kitchen">Kitchen Staff</option>
        <option value="store">Store Staff</option>
        <option value="staff">General Staff</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
    </div>
    <button class="btn btn-primary btn-full btn-lg" id="reg-btn" onclick="doSignup()" style="margin-top:0.5rem">Create Account</button>
    <div style="text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--text-muted)">
      Already have an account? <a href="/login/" style="color:var(--primary);font-weight:500">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function doSignup(){
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const role=document.getElementById('role').value;
  const password=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;
  if(!name||!email||!role||!password){showErr('Please fill in all fields');return;}
  if(password!==confirm){showErr('Passwords do not match');return;}
  if(password.length<8){showErr('Password must be at least 8 characters');return;}
  const btn=document.getElementById('reg-btn');
  btn.disabled=true; btn.textContent='Creating account…';
  try{
    const r=await fetch('/api/signup/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,role})});
    const d=await r.json();
    if(r.ok){showToast('Account created! Please sign in.','gold');setTimeout(()=>window.location.href='/login/',1500);}
    else{showErr(d.message||'Registration failed');btn.disabled=false;btn.textContent='Create Account';}
  }catch(e){showErr('Network error. Please try again.');btn.disabled=false;btn.textContent='Create Account';}
}
function showErr(m){document.getElementById('err-msg').innerHTML=`<div class="alert alert-error">${m}</div>`;}
</script>
{% endblock %}
