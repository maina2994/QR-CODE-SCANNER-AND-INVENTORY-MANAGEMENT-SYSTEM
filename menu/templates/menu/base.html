<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Saveur — Luxury Dining{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#9A7830;--gold-pale:rgba(201,168,76,0.08);
  --black:#070707;--dark:#0E0E0E;--dark2:#141414;--dark3:#1C1C1C;--dark4:#242424;
  --text:#F0EAD6;--text-muted:#8A8070;--text-dim:#504840;
  --border:rgba(201,168,76,0.15);--border-hover:rgba(201,168,76,0.4);--border-strong:rgba(201,168,76,0.6);
  --radius:6px;--radius-lg:14px;--radius-xl:20px;
  --success:#2D6A4F;--success-light:#52B788;
  --error:#922B21;--error-light:#E74C3C;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
nav{background:rgba(7,7,7,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 3rem;display:flex;align-items:center;justify-content:space-between;height:72px;position:sticky;top:0;z-index:200}
.nav-brand{display:flex;flex-direction:column;align-items:flex-start;text-decoration:none}
.nav-brand-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--gold);letter-spacing:0.12em;line-height:1}
.nav-brand-tagline{font-size:0.6rem;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;margin-top:2px}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-link{color:var(--text-muted);text-decoration:none;font-size:0.8rem;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;transition:color 0.3s;position:relative}
.nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s}
.nav-link:hover{color:var(--gold)}
.nav-link:hover::after{width:100%}
.nav-cart{position:relative;cursor:pointer}
.cart-badge{position:absolute;top:-8px;right:-8px;background:var(--gold);color:var(--black);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0.7rem 1.8rem;border-radius:var(--radius);font-size:0.8rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;text-decoration:none;border:none;font-family:'Inter',sans-serif}
.btn-gold{background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-light));color:var(--black);font-weight:600}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,0.3)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--border-hover)}
.btn-outline:hover{background:var(--gold-pale);border-color:var(--border-strong)}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border-hover)}
.btn-sm{padding:0.5rem 1.2rem;font-size:0.75rem}
.btn-lg{padding:1rem 2.5rem;font-size:0.85rem}
.btn-full{width:100%}

/* CARDS */
.card{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.card-luxury{background:linear-gradient(145deg,var(--dark2),var(--dark3));border:1px solid var(--border);border-radius:var(--radius-lg);position:relative;overflow:hidden}
.card-luxury::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* FORMS */
.form-group{margin-bottom:1.25rem}
label{font-size:0.75rem;color:var(--text-muted);font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;display:block}
input,select,textarea{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:0.85rem 1.1rem;font-size:0.9rem;font-family:'Inter',sans-serif;width:100%;transition:all 0.3s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);background:var(--dark4)}
input::placeholder{color:var(--text-dim)}
select option{background:var(--dark3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:0.3rem 0.8rem;border-radius:20px;font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.badge-gold{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
.badge-green{background:rgba(82,183,136,0.12);color:#52B788;border:1px solid rgba(82,183,136,0.25)}
.badge-blue{background:rgba(96,165,250,0.12);color:#60a5fa;border:1px solid rgba(96,165,250,0.25)}
.badge-yellow{background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.25)}
.badge-red{background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.25)}

/* ALERTS */
.alert{padding:1rem 1.25rem;border-radius:var(--radius);font-size:0.875rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.75rem}
.alert-error{background:rgba(146,43,33,0.1);border:1px solid rgba(231,76,60,0.25);color:#f87171}
.alert-success{background:rgba(45,106,79,0.1);border:1px solid rgba(82,183,136,0.25);color:#52B788}
.alert-info{background:rgba(201,168,76,0.08);border:1px solid var(--border);color:var(--gold)}

/* DIVIDERS */
.divider-gold{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--text-dim);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase}
.divider-gold::before,.divider-gold::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border))}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark3);border:1px solid var(--border-hover);border-radius:var(--radius-lg);padding:1rem 2rem;color:var(--text);font-size:0.875rem;opacity:0;transition:all 0.4s;z-index:999;white-space:nowrap;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-gold{border-color:var(--border-strong);color:var(--gold)}

/* ORNAMENT */
.ornament{display:flex;align-items:center;gap:1rem;justify-content:center;margin:1rem 0}
.ornament-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.ornament-line.right{background:linear-gradient(90deg,var(--gold),transparent)}
.ornament-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg)}

/* LOADING */
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE LOADER */
.page-loader{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s}
.page-loader.hidden{opacity:0;pointer-events:none}
.page-loader-brand{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold);letter-spacing:0.2em;animation:pulse-gold 1.5s infinite}
@keyframes pulse-gold{0%,100%{opacity:1}50%{opacity:0.4}}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:2px}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="page-loader" id="page-loader">
  <div class="page-loader-brand">SAVEUR</div>
</div>

<nav>
  <a href="/" class="nav-brand">
    <span class="nav-brand-name">SAVEUR</span>
    <span class="nav-brand-tagline">Luxury Dining</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link">Menu</a>
    <a href="/qr-generate/" class="nav-link">Tables</a>
    <a href="/login/" class="nav-link">Staff</a>
    <a href="/cart/" class="nav-cart nav-link">
      Cart
      <span class="cart-badge" id="cart-count">0</span>
    </a>
  </div>
</nav>

{% block content %}{% endblock %}

<div class="toast" id="toast"></div>

<footer style="border-top:1px solid var(--border);padding:2rem 3rem;display:flex;align-items:center;justify-content:space-between;margin-top:4rem">
  <div style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);letter-spacing:0.1em">SAVEUR</div>
  <div style="font-size:0.75rem;color:var(--text-dim);letter-spacing:0.1em">© 2026 SAVEUR LUXURY DINING. ALL RIGHTS RESERVED.</div>
  <div style="display:flex;gap:1.5rem">
    <a href="/login/" style="font-size:0.75rem;color:var(--text-dim);text-decoration:none;letter-spacing:0.1em">STAFF LOGIN</a>
    <a href="/qr-generate/" style="font-size:0.75rem;color:var(--text-dim);text-decoration:none;letter-spacing:0.1em">TABLES</a>
  </div>
</footer>

<script>
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('page-loader').classList.add('hidden');
  },800);
});

function updateCartCount(){
  const c=JSON.parse(localStorage.getItem('cart')||'[]');
  const t=c.reduce((s,i)=>s+i.quantity,0);
  const el=document.getElementById('cart-count');
  if(el) el.textContent=t;
}
updateCartCount();

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(type?' toast-'+type:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Currency converter
window.USD_TO_KES = 130;
window.showBoth = (usd) => {
  const kes = (usd * window.USD_TO_KES).toFixed(0);
  return `$${parseFloat(usd).toFixed(2)} <span style="color:var(--text-dim);font-size:0.8em">/ KES ${parseInt(kes).toLocaleString()}</span>`;
};
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
