{% extends 'menu/base.html' %}
{% block title %}Login — Saveur{% endblock %}
{% block extra_css %}
<style>
.auth-page{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-card{width:100%;max-width:420px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem}
.auth-logo{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);text-align:center;margin-bottom:0.5rem}
.auth-subtitle{text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:2rem}
.auth-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--text-dim);font-size:0.85rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{text-align:center;font-size:0.9rem;color:var(--text-muted);margin-top:1.5rem}
.auth-link a{color:var(--gold);text-decoration:none}
.auth-link a:hover{text-decoration:underline}
.input-icon{position:relative}
.input-icon input{padding-left:2.8rem}
.input-icon svg{position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.role-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;background:var(--dark3);padding:0.25rem;border-radius:var(--radius)}
.role-tab{flex:1;padding:0.5rem;text-align:center;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-muted);border:none;background:transparent;transition:all 0.2s}
.role-tab.active{background:var(--dark2);color:var(--gold);border:1px solid var(--border)}
.domain-hint{font-size:0.78rem;color:var(--text-dim);margin-top:0.3rem}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">SAVEUR</div>
    <div class="auth-subtitle">Staff & Admin Portal</div>

    <div id="error-msg" class="alert alert-error" style="display:none"></div>
    <div id="success-msg" class="alert alert-success" style="display:none"></div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('staff')">Staff</button>
      <button class="role-tab" onclick="setRole('admin')">Admin</button>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        <input type="email" id="email" placeholder="name@restaurant.com" />
      </div>
      <div class="domain-hint" id="domain-hint">Use your @restaurant.com email</div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')login()" />
      </div>
    </div>

    <button class="btn btn-gold" style="width:100%;justify-content:center;padding:0.85rem" onclick="login()">
      Sign In
    </button>

    <div class="auth-divider">or</div>

    <div class="auth-link">
      Don't have an account? <a href="/signup/">Request Access</a>
    </div>
    <div class="auth-link" style="margin-top:0.75rem">
      <a href="/">Back to Menu</a>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
let currentRole = 'staff';

function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&role==='staff')||(i===1&&role==='admin'));
  });
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if(!email || !password) {
    errEl.textContent = 'Please enter your email and password';
    errEl.style.display = 'block';
    return;
  }

  if(!email.endsWith('@restaurant.com')) {
    errEl.textContent = 'Please use your @restaurant.com email address';
    errEl.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('/api/login/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if(res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('role', data.role || currentRole);
      sucEl.textContent = 'Login successful! Redirecting...';
      sucEl.style.display = 'block';
      setTimeout(() => {
        window.location.href = data.role === 'admin' ? '/admin-dashboard/' : '/staff/';
      }, 800);
    } else {
      errEl.textContent = data.message || 'Invalid credentials';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.style.display = 'block';
  }
}
</script>
{% endblock %}
