{% extends 'menu/base.html' %}
{% block title %}Staff Login — Saveur{% endblock %}
{% block extra_css %}
<style>
.auth-page{min-height:85vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem;background:linear-gradient(135deg,var(--sand-light) 0%,var(--cream) 100%)}
.auth-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-xl);padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--primary);letter-spacing:0.1em;text-align:center;margin-bottom:0.25rem}
.auth-sub{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);text-align:center;margin-bottom:2rem}
@media(max-width:480px){.auth-card{padding:2rem 1.25rem;border-radius:var(--radius-lg)}}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">SAVEUR</div>
    <div class="auth-sub">Staff Portal</div>
    <div class="ornament" style="margin-bottom:1.75rem"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line r"></div></div>
    <div id="err-msg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@restaurant.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="doLogin()" style="margin-top:0.5rem">Sign In</button>
    <div style="text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--text-muted)">
      Don't have an account? <a href="/signup/" style="color:var(--primary);font-weight:500">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!password){showErr('Please fill in all fields');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    const r=await fetch('/api/login/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(d.token){
      localStorage.setItem('token',d.token);
      localStorage.setItem('role',d.role);
      localStorage.setItem('staffName',d.name||'');
      localStorage.setItem('staffId',d.id||'');
      const dest={admin:'/staff/',staff:'/staff/',waiter:'/waiter/',kitchen:'/kitchen/',store:'/store/'}[d.role]||'/staff/';
      window.location.href=dest;
    }else{showErr(d.message||'Login failed');btn.disabled=false;btn.textContent='Sign In';}
  }catch(e){showErr('Network error. Please try again.');btn.disabled=false;btn.textContent='Sign In';}
}
function showErr(m){document.getElementById('err-msg').innerHTML=`<div class="alert alert-error">${m}</div>`;}
</script>
{% endblock %}
