{% extends 'menu/base.html' %}
{% block title %}Order History — Saveur{% endblock %}
{% block extra_css %}
<style>
.history-page{max-width:700px;margin:0 auto;padding:2.5rem 2rem}
.page-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:400;margin-bottom:0.25rem}
.page-sub{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2rem}
.phone-check{background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:2rem;box-shadow:var(--shadow);display:flex;gap:0.75rem}
.order-card{background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:0.75rem;box-shadow:var(--shadow);transition:all 0.2s;cursor:pointer}
.order-card:hover{border-color:var(--border-hover)}
.oc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem}
.oc-id{font-family:'Cormorant Garamond',serif;font-size:1.1rem}
.oc-date{font-size:0.75rem;color:var(--text-muted)}
.oc-items{font-size:0.82rem;color:var(--text-muted);margin-bottom:0.5rem}
.oc-footer{display:flex;align-items:center;justify-content:space-between}
.oc-total{font-weight:600;color:var(--primary)}
@media(max-width:480px){.history-page{padding:1.5rem 1rem}}
</style>
{% endblock %}
{% block content %}
<div class="history-page">
  <h1 class="page-title">Order History</h1>
  <p class="page-sub">Your previous orders at Saveur</p>
  <div class="phone-check">
    <input type="tel" id="hist-phone" placeholder="Enter your M-Pesa number to load history" style="flex:1" />
    <button class="btn btn-gold" onclick="loadHistory()">Load</button>
  </div>
  <div id="history-list"><div style="text-align:center;padding:3rem;color:var(--text-muted)">Enter your phone number to view order history</div></div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const saved = localStorage.getItem('customerPhone');
if(saved){ document.getElementById('hist-phone').value=saved; loadHistory(); }
async function loadHistory(){
  const phone=document.getElementById('hist-phone').value.trim();
  if(!phone) return;
  localStorage.setItem('customerPhone',phone);
  document.getElementById('history-list').innerHTML='<div style="text-align:center;padding:2rem"><div class="spinner"></div></div>';
  try{
    const res=await fetch(`${API}/customer/orders?phone=${encodeURIComponent(phone)}`);
    const orders=await res.json();
    if(!orders.length){ document.getElementById('history-list').innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-muted)">No orders found for this number</div>'; return; }
    document.getElementById('history-list').innerHTML=orders.map(o=>`
      <div class="order-card" onclick="window.location.href='/track-order/?order_id=${o.id}'">
        <div class="oc-header"><div class="oc-id">Order #${o.id}</div><div class="oc-date">${new Date(o.created_at).toLocaleDateString('en-KE')}</div></div>
        <div class="oc-items">${(o.items||[]).map(i=>i.name).join(', ')||'View details'}</div>
        <div class="oc-footer"><span class="oc-total">KES ${Math.round(o.total_kes||o.total_amount||0).toLocaleString()}</span><span class="badge ${sb(o.status)}">${o.status}</span></div>
      </div>
    `).join('');
  }catch(e){ document.getElementById('history-list').innerHTML='<div style="text-align:center;padding:2rem;color:var(--error-light)">Could not load history</div>'; }
}
function sb(s){return{pending:'badge-yellow',preparing:'badge-blue',ready:'badge-green',served:'badge-gold',completed:'badge-earth'}[s]||'badge-yellow';}
</script>
{% endblock %}
