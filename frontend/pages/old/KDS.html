<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kitchen Display</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #111;
            color: white;
        }

        header {
            background: black;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .orders {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #1c1c1c;
            padding: 15px;
            border-radius: 10px;
        }

        .card h2 {
            margin: 0;
            color: #ff5a00;
        }

        .items {
            margin-top: 10px;
        }

        .items p {
            margin: 5px 0;
        }

        .time {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }

        .done-btn {
            margin-top: 10px;
            padding: 8px;
            border: none;
            background: green;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .done-btn:hover {
            background: #00c853;
        }
    </style>
</head>

<body>

    <header>🍳 Kitchen Orders</header>

    <div class="orders" id="orders"></div>

    <script>
        function loadOrders() {
            let orders = JSON.parse(localStorage.getItem("allOrders")) || [];

            let container = document.getElementById("orders");

            if (!container) return;

            container.innerHTML = "";

            orders.forEach((order, index) => {
                let itemsHTML = "";

                if (order.items) {
                    order.items.forEach(item => {
                        itemsHTML += `<p>${item.name} x${item.quantity}</p>`;
                    });
                }

                container.innerHTML += `
        <div class="card">
            <h2>Table ${order.table || "N/A"}</h2>
            ${itemsHTML}
            <p>Status: ${order.status || "pending"}</p>

            <button onclick="updateStatus(${index}, 'cooking')">Start Cooking</button>
            <button onclick="updateStatus(${index}, 'ready')">Mark Ready</button>
        </div>
        `;
            });
        }

        function updateStatus(index, newStatus) {
            let orders = JSON.parse(localStorage.getItem("allOrders")) || [];

            orders[index].status = newStatus;

            localStorage.setItem("allOrders", JSON.stringify(orders));

            loadOrders();
        }

        window.onload = loadOrders;
    </script>

</body>

</html>
