<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FoodMart</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            height: 100vh;
            background: #0f766e;
            color: white;
            padding: 20px;
            position: fixed;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
        }

        /* MAIN */
        .main {
            margin-left: 250px;
            width: 100%;
            padding: 20px;
        }

        /* NAVBAR */
        .main-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* HIGHLIGHT */
        .highlight-wrapper {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .highlight-card {
            min-width: 200px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .highlight-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }

        .highlight-desc {
            padding: 10px;
        }

        /* FILTER */
        .filter-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-card {
            padding: 10px 15px;
            background: #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-card:hover {
            background: #0f766e;
            color: white;
        }

        /* GRID */
        .detail-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* CARD */
        .detail-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .detail-card:hover {
            transform: scale(1.05);
        }

        .detail-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .detail-desc {
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .price {
            color: #0f766e;
            font-weight: bold;
        }

        /* MOBILE */
        @media(max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>FoodMart</h2>
        <a href="#">🏠 Home</a>
        <a href="#">🧾 Bill</a>
        <a href="#">💳 Payment</a>
        <a href="#">🔔 Notification</a>
        <a href="#">📞 Contact</a>
        <a href="#">⚙ Settings</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- NAVBAR -->
        <div class="main-navbar">
            <h2>Welcome</h2>
            <div>
                🛒 👤
            </div>
        </div>

        <!-- HIGHLIGHTS -->
        <h3>🔥 Top Meals</h3>
        <div class="highlight-wrapper">
            <div class="highlight-card">
                <img class="highlight-img" src="bigburger.jpg">
                <div class="highlight-desc">
                    <h4>Burger</h4>
                    <p>Ksh 120</p>
                </div>
            </div>

            <div class="highlight-card">
                <img class="highlight-img" src="download.jpeg">
                <div class="highlight-desc">
                    <h4>Coffee</h4>
                    <p>Ksh 50</p>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <h3>🍽 Categories</h3>
        <div class="filter-wrapper">
            <div class="filter-card" onclick="filter('all')">All</div>
            <div class="filter-card" onclick="filter('burger')">Burger</div>
            <div class="filter-card" onclick="filter('drinks')">Drinks</div>
            <div class="filter-card" onclick="filter('rice')">Rice</div>
            <div class="filter-card" onclick="filter('meat')">Meat</div>
        </div>

        <!-- MENU -->
        <h3>🛒 Place Order</h3>
        <div class="detail-wrapper">

            <div class="detail-card burger">
                <img class="detail-img" src="bigburger.jpg">
                <div class="detail-desc">
                    <h4>Burger</h4>
                    <p class="price">Ksh 120</p>
                </div>
            </div>

            <div class="detail-card drinks">
                <img class="detail-img" src="wine.jpg">
                <div class="detail-desc">
                    <h4>Wine</h4>
                    <p class="price">Ksh 1800</p>
                </div>
            </div>

            <div class="detail-card meat">
                <img class="detail-img" src="nyamachoma.jpg">
                <div class="detail-desc">
                    <h4>Nyama Choma</h4>
                    <p class="price">Ksh 350</p>
                </div>
            </div>

            <div class="detail-card rice">
                <img class="detail-img" src="rice.jpg">
                <div class="detail-desc">
                    <h4>Rice Biryani</h4>
                    <p class="price">Ksh 500</p>
                </div>
            </div>

        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        function filter(category) {
            let cards = document.querySelectorAll(".detail-card");

            cards.forEach(card => {
                if (category === "all") {
                    card.style.display = "block";
                } else {
                    card.style.display = card.classList.contains(category)
                        ? "block"
                        : "none";
                }
            });
        }
    </script>

</body>

</html>
