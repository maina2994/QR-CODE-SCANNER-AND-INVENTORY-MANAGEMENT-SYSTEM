<!DOCTYPE html>
<html>

<head>
    <title>Billing Receipt</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        header {
            background: green;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .receipt {
            background: white;
            margin: 30px auto;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .total {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        .btn {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            border: none;
            background: green;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .info {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h2>🧾 Payment Receipt</h2>
    </header>

    <div class="receipt">
        <div class="info">
            <p><strong>Receipt No:</strong> <span id="receipt-no"></span></p>
            <p><strong>Date & Time:</strong> <span id="date-time"></span></p>
            <p><strong>Customer:</strong> <span id="customer-name"></span></p>
        </div>

        <div id="receipt-items"></div>

        <div class="total" id="total"></div>

        <button class="btn" onclick="downloadReceipt()">Download Receipt</button>
        <button class="btn" onclick="goHome()">Back to Menu</button>
    </div>

    <script>
        function loadReceipt() {
            let order = JSON.parse(localStorage.getItem("lastOrder")) || [];
            let container = document.getElementById("receipt-items");

            // Receipt info
            let receiptNo = Math.floor(1000 + Math.random() * 9000);
            let now = new Date();
            let customer = localStorage.getItem("customerName") || prompt("Enter your name:");

            if (!localStorage.getItem("customerName")) {
                localStorage.setItem("customerName", customer);
            }

            document.getElementById("receipt-no").innerText = receiptNo;
            document.getElementById("date-time").innerText = now.toLocaleString();
            document.getElementById("customer-name").innerText = customer;

            let total = 0;
            container.innerHTML = "";

            if (order.length === 0) {
                container.innerHTML = "<p>No recent order found.</p>";
                return;
            }

            order.forEach(item => {
                if (!item.quantity) item.quantity = 1;
                let subtotal = item.price * item.quantity;
                total += subtotal;

                container.innerHTML += `
            <div class="item">
                <span>${item.name} x${item.quantity}</span>
                <span>Ksh ${subtotal}</span>
            </div>
        `;
            });

            document.getElementById("total").innerText = "Total Paid: Ksh " + total;
        }

        function goHome() {
            localStorage.removeItem("lastOrder");
            localStorage.removeItem("customerName");
            window.location.href = "all-meals.html"; // your home/menu page
        }

        // Simple receipt download
        function downloadReceipt() {
            let receipt = document.querySelector(".receipt").innerHTML;
            let newWindow = window.open("", "", "width=600,height=700");
            newWindow.document.write("<html><head><title>Receipt</title></head><body>");
            newWindow.document.write("<h2>FoodMart Receipt</h2>");
            newWindow.document.write(receipt);
            newWindow.document.write("</body></html>");
            newWindow.document.close();
            newWindow.print();
        }

        window.onload = loadReceipt;

    </script>

</body>

</html>
