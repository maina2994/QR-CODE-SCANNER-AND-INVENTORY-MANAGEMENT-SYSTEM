<!DOCTYPE html>
<html>

<head>
    <title>Your Cart</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .cart-container {
            padding: 20px;
        }

        .cart-item {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item h3 {
            margin: 0;
        }

        .cart-item p {
            margin: 5px 0;
            color: #555;
        }

        .remove-btn {
            background: red;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .summary {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            background: #ff5a00;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin: 10px;
            cursor: pointer;
        }

        .btn-clear {
            background: red;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-pay {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 10px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>

</head>

<body>
    <div class="container">
        <h2>Your Cart</h2>

        <div id="cart-items"></div>

        <h3 id="total"></h3>
    </div>
    <div>
        <button onclick="clearCart()" class="btn-clear">Clear Cart</button>
        <button onclick="checkout()" class="btn-pay">Proceed to Payment</button>
    </div>
    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart"));

            let container = document.getElementById("cart-items");
            let total = 0;

            container.innerHTML = "";

            if (!cart || cart.length === 0) {
                container.innerHTML = "<h3>Your cart is empty 🛒</h3>";
                document.getElementById("total").innerText = "";
                return;
            }

            cart.forEach((item, index) => {
                if (!item.quantity) item.quantity = 1;

                total += item.price * item.quantity;

                container.innerHTML += `
            <div class="cart-item">
                <div>
                    <strong>${item.name}</strong><br>
                    Ksh ${item.price}
                </div>

                <div>
                    <button onclick="decrease(${index})">-</button>
                    ${item.quantity}
                    <button onclick="increase(${index})">+</button>
                </div>

                <div>
                    Ksh ${item.price * item.quantity}
                </div>

                <button onclick="removeItem(${index})">❌</button>
            </div>
            `;
            });

            document.getElementById("total").innerText = "Total: Ksh " + total;
        }

        window.onload = loadCart;

        function increase(index) {
            let cart = JSON.parse(localStorage.getItem("cart"));
            cart[index].quantity++;
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function decrease(index) {
            let cart = JSON.parse(localStorage.getItem("cart"));
            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart"));
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function clearCart() {
            localStorage.removeItem("cart");
            loadCart();
            alert("Cart cleared!");
        }

        // 🔥 FULL CHECKOUT SYSTEM
        function checkout() {
            let cart = JSON.parse(localStorage.getItem("cart"));
            let table = localStorage.getItem("tableNumber");
            console.log("Table in checkout:", table);
            if (!cart || cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }

            // Ask for phone
            let phone = prompt("Enter M-Pesa Number (07XXXXXXXX):");
            if (!phone) {
                alert("Payment cancelled");
                return;
            }

            // Ask for customer name
            let name = prompt("Enter your name:");
            if (!name) {
                alert("Name required!");
                return;
            }

            alert("STK Push sent to " + phone + " 📲");

            setTimeout(() => {
                alert("Enter M-Pesa PIN on your phone...");

                setTimeout(() => {
                    alert("Payment Successful ✅");

                    // ✅ SAVE LAST ORDER (for receipt page)
                    localStorage.setItem("lastOrder", JSON.stringify(cart));
                    localStorage.setItem("customerName", name);
                    localStorage.setItem("lastPhone", phone);

                    let table = localStorage.getItem("tableNumber");

                    let allOrders = JSON.parse(localStorage.getItem("allOrders")) || [];

                    allOrders.push({
                        items: cart,
                        phone: phone,
                        name: name,
                        table: table,
                        status: "pending",   // ⭐ IMPORTANT
                        date: new Date().toLocaleString()
                    });

                    localStorage.setItem("allOrders", JSON.stringify(allOrders));

                    // 🔔 notifications
                    let notifications = JSON.parse(localStorage.getItem("notifications")) || [];

                    notifications.push({
                        message: "Order placed successfully 🛒",
                        time: new Date().toLocaleString()
                    });

                    notifications.push({
                        message: "M-Pesa payment received 💳",
                        time: new Date().toLocaleString()
                    });

                    localStorage.setItem("notifications", JSON.stringify(notifications));

                    /* 🔥 REAL-TIME TRIGGER */
                    window.dispatchEvent(new Event("storage"));
                    // 📦 REDUCE STOCK
                    let stock = JSON.parse(localStorage.getItem("stock")) || {};

                    cart.forEach(item => {
                        if (stock[item.name] !== undefined) {
                            stock[item.name] -= item.quantity;
                            if (stock[item.name] < 0) stock[item.name] = 0;
                        }
                    });

                    localStorage.setItem("stock", JSON.stringify(stock));

                    // 🧹 CLEAR CART
                    localStorage.removeItem("cart");

                    // 🚀 REDIRECT TO RECEIPT
                    window.location.href = "bill.html";

                }, 2000);

            }, 1500);
        }

        localStorage.setItem("allOrders", JSON.stringify(allOrders));
    </script>
</body>

</html>
